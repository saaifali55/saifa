<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سيف علي | موقعي الشخصي</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    min-height:100vh;
    background:url('https://wallpapercave.com/wp/wp2757874.gif') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
}

.container{
    position:relative;
    z-index:10;
    width:400px;
    text-align:center;
}

.profile{
    width:170px;
    height:170px;
    border-radius:50%;
    border:4px solid #00aaff;
    box-shadow:0 0 30px #00aaff;
    object-fit:cover;
}

h1{
    margin-top:20px;
    font-size:45px;
    text-shadow:0 0 15px #00aaff;
}

.desc{
    margin-top:10px;
    color:#ddd;
}

.line{
    width:80px;
    height:4px;
    background:#00aaff;
    margin:15px auto 30px;
    border-radius:20px;
}

.social{
    display:flex;
    align-items:center;
    justify-content:space-between;
    text-decoration:none;
    color:white;
    background:rgba(0,20,40,.8);
    border:2px solid #00aaff;
    border-radius:20px;
    padding:18px 25px;
    margin:15px 0;
    transition:.3s;
    box-shadow:0 0 15px #00aaff55;
}

.social:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px #00aaff;
}

.social i{
    font-size:30px;
}

.social span{
    font-size:24px;
}

.footer{
    margin-top:50px;
    color:#aaa;
    font-size:14px;
}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <img src="profile.jpg" class="profile">

    <h1>سيف علي</h1>

    <p class="desc">مرحباً بكم في موقعي الشخصي</p>

    <div class="line"></div>

    <a href="https://instagram.com" class="social">
        <i class="fab fa-instagram"></i>
        <span>Instagram</span>
        <i class="fas fa-arrow-left"></i>
    </a>

    <a href="https://tiktok.com" class="social">
        <i class="fab fa-tiktok"></i>
        <span>TikTok</span>
        <i class="fas fa-arrow-left"></i>
    </a>

    <a href="https://telegram.org" class="social">
        <i class="fab fa-telegram"></i>
        <span>Telegram</span>
        <i class="fas fa-arrow-left"></i>
    </a>

    <a href="https://github.com" class="social">
        <i class="fab fa-github"></i>
        <span>GitHub</span>
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="footer">
        © 2025 سيف علي - جميع الحقوق محفوظة
    </div>

</div>

</body>
</html>
